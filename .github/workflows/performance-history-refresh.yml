name: Performance History Refresh

on:
  workflow_dispatch:
    inputs:
      sync_supabase:
        description: "Sync model_evaluation_runs and strategy_backtest_results"
        required: false
        default: "true"
      dry_run:
        description: "Build artifacts but skip Supabase writes and git publish"
        required: false
        default: "false"
  schedule:
    - cron: "30 14 * * 1"

permissions:
  contents: write

concurrency:
  group: sports-edge-performance-history-refresh
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}/data-core
  SYNC_SUPABASE: ${{ github.event.inputs.sync_supabase || 'true' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  refresh-performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: data-core/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r data-core/requirements.txt
          npm ci --prefix web

      - name: Export performance history
        run: |
          python data-core/scripts/export_performance_history.py
          npm --prefix web run sync:performance

      - name: Sync evaluation tables
        if: ${{ env.SYNC_SUPABASE == 'true' && env.DRY_RUN != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          cd data-core
          python scripts/apply_supabase_sql_files.py sql/009_model_evaluation_tables.sql
          python scripts/sync_evaluation_history_to_supabase.py

      - name: Publish performance artifacts
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-core/notebooks/cache/performance_history.json data-core/docs/PERFORMANCE_HISTORY.md web/public/data/performance_history.json
          git status --short
          if git diff --cached --quiet; then
            echo "No performance artifact changes to publish."
            exit 0
          fi
          git commit -m "Refresh performance history"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: Notify portfolio doc sync
        if: success()
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PORTFOLIO_DISPATCH_TOKEN" ]; then
            echo "PORTFOLIO_DISPATCH_TOKEN is not configured; skipping portfolio doc sync dispatch."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer ${PORTFOLIO_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/dmboynton56/personal-portfolio/dispatches \
            -d "{\"event_type\":\"sports-edge-refresh\",\"client_payload\":{\"source\":\"performance-history-refresh\",\"run_id\":\"${{ github.run_id }}\"}}"
