name: Daily Sports-Edge Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Supabase writes (validation-only run)"
        required: false
        default: "false"
      force_full_rebuild:
        description: "Force full feature snapshot rebuild"
        required: false
        default: "false"
  schedule:
    - cron: "0 13 * * *" # Daily at 13:00 UTC (08:00 ET)

concurrency:
  group: sports-edge-daily-refresh
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PYTHONPATH: ${{ github.workspace }}/data-core
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  FORCE_FULL_REBUILD: ${{ github.event.inputs.force_full_rebuild || 'false' }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-core
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: data-core/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt google-cloud-bigquery nflreadpy supabase

      - name: Configure GCP credentials
        shell: bash
        run: |
          echo "$GCP_SERVICE_ACCOUNT_KEY" > "$GOOGLE_APPLICATION_CREDENTIALS"
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Update NBA Raw Data
        shell: bash
        run: |
          # NBA season is usually referred to by the year it started (e.g., Jan 2026 is 2025-26 season)
          MONTH=$(date +%m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -lt "08" ]; then
            SEASON=$((YEAR - 1))
          else
            SEASON=$YEAR
          fi
          # Fetch Yesterday, Today, and Tomorrow to ensure BigQuery is perfectly in sync
          START_DATE=$(date -u -d "yesterday" +%Y-%m-%d)
          python scripts/backfill_nba_raw.py --project "$PROJECT_ID" --seasons "$SEASON" --schedule-start "$START_DATE" --schedule-window-days 3

      - name: Update NFL Raw Data
        shell: bash
        run: |
          # NFL season is the year it started (e.g., Jan 2026 is still 2025 season)
          MONTH=$(date +%m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -lt "08" ]; then
            SEASON=$((YEAR - 1))
          else
            SEASON=$YEAR
          fi
          python scripts/backfill_nfl_raw.py --project "$PROJECT_ID" --seasons "$SEASON" --replace

      - name: Build NBA Feature Snapshots
        shell: bash
        run: |
          # NBA season is usually referred to by the year it started (e.g., Jan 2026 is 2025-26 season)
          MONTH=$(date +%m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -lt "08" ]; then
            SEASON=$((YEAR - 1))
          else
            SEASON=$YEAR
          fi
          if [ "$FORCE_FULL_REBUILD" = "true" ]; then
            python scripts/build_feature_snapshots.py --project "$PROJECT_ID" --league NBA --seasons "$SEASON" --replace
          else
            python scripts/build_feature_snapshots.py --project "$PROJECT_ID" --league NBA --seasons "$SEASON"
          fi

      - name: Build NFL Feature Snapshots
        shell: bash
        run: |
          # NFL season is the year it started (e.g., Jan 2026 is still 2025 season)
          MONTH=$(date +%m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -lt "08" ]; then
            SEASON=$((YEAR - 1))
          else
            SEASON=$YEAR
          fi
          if [ "$FORCE_FULL_REBUILD" = "true" ]; then
            python scripts/build_feature_snapshots.py --project "$PROJECT_ID" --league NFL --seasons "$SEASON" --replace
          else
            python scripts/build_feature_snapshots.py --project "$PROJECT_ID" --league NFL --seasons "$SEASON"
          fi

      - name: Generate NBA Predictions
        shell: bash
        run: |
          python -m src.pipeline.refresh_nba --project "$PROJECT_ID" --model-version v3

      - name: Generate NFL Predictions
        shell: bash
        run: |
          # NFL weekly refresh logic can stay here, or run daily to catch line movements
          python -m src.pipeline.refresh_nfl --project "$PROJECT_ID" --model-version v1

      - name: Sync Predictions to Supabase
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          python scripts/sync_bq_to_supabase.py --project "$PROJECT_ID" --league NBA --append
          python scripts/sync_bq_to_supabase.py --project "$PROJECT_ID" --league NFL --append

      - name: Sync Market Odds
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          max_attempts=5
          attempt=1
          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "sync_odds attempt ${attempt}/${max_attempts}"
            if python scripts/sync_odds.py --project "$PROJECT_ID"; then
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "sync_odds failed after ${max_attempts} attempts"
              exit 1
            fi
            sleep_seconds=$((30 * 2 ** (attempt - 1)))
            echo "Retrying sync_odds in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Repair Missing Book Spreads
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          START_DATE=$(date -u -d "3 days ago" +%Y-%m-%d)
          END_DATE=$(date -u -d "14 days" +%Y-%m-%d)
          python scripts/populate_existing_book_odds.py --league NBA --start-date "$START_DATE" --end-date "$END_DATE"
          python scripts/populate_existing_book_odds.py --league NFL --start-date "$START_DATE" --end-date "$END_DATE"

      - name: Sync Final Scores
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          python scripts/sync_final_scores.py --project "$PROJECT_ID" --lookback-days 4 --lookahead-days 1

      - name: Post-sync validation
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          python scripts/validate_supabase_sync.py --strict | tee /tmp/sports_edge_validation.json
          echo "### Sports Edge Sync Validation" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat /tmp/sports_edge_validation.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Dry-run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry run completed: Supabase write and strict validation steps were skipped." >> $GITHUB_STEP_SUMMARY

      - name: Build run summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            RUN_MODE="dry-run"
          else
            RUN_MODE="normal"
          fi

          python scripts/generate_run_summary.py \
            --mode "$RUN_MODE" \
            --status "$JOB_STATUS" \
            --run-url "$RUN_URL" \
            --repository "$GITHUB_REPOSITORY" \
            --workflow "$GITHUB_WORKFLOW" \
            --validation-json /tmp/sports_edge_validation.json \
            --output-markdown /tmp/sports_edge_run_summary.md \
            --discord-json /tmp/sports_edge_discord.json \
            --allow-query-failures

          cat /tmp/sports_edge_run_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord on Success
        if: success()
        shell: bash
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping success notification."
            exit 0
          fi

          curl -X POST -H "Content-Type: application/json" \
            -d @/tmp/sports_edge_discord.json \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on Failure
        if: failure()
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping failure notification."
            exit 0
          fi

          if [ -s /tmp/sports_edge_discord.json ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d @/tmp/sports_edge_discord.json \
              "$DISCORD_WEBHOOK_URL"
          else
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"content\": \"**Sports-Edge Refresh failed**\\nRun: $RUN_URL\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
