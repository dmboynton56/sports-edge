name: Player Market Refresh

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Anchor date in YYYY-MM-DD (defaults to current UTC date)"
        required: false
        default: ""
      run_pga:
        description: "Run PGA tournament refresh through the registry orchestrator"
        required: false
        default: "false"
      run_mlb_hr:
        description: "Run MLB home run refresh"
        required: false
        default: "true"
      train_mlb_hr:
        description: "Retrain MLB home run model before scoring"
        required: false
        default: "false"
      sync_supabase:
        description: "Sync generated player markets to Supabase"
        required: false
        default: "true"
      sync_bigquery:
        description: "Sync generated player markets to BigQuery"
        required: false
        default: "true"

concurrency:
  group: sports-edge-player-markets
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PYTHONPATH: ${{ github.workspace }}/data-core
  RUN_PGA: ${{ github.event.inputs.run_pga || 'true' }}
  RUN_MLB_HR: ${{ github.event.inputs.run_mlb_hr || 'true' }}
  TRAIN_MLB_HR: ${{ github.event.inputs.train_mlb_hr || 'false' }}
  SYNC_SUPABASE: ${{ github.event.inputs.sync_supabase || 'true' }}
  SYNC_BIGQUERY: ${{ github.event.inputs.sync_bigquery || 'true' }}
  ANCHOR_DATE: ${{ github.event.inputs.date || '' }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-core
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: data-core/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt google-cloud-bigquery supabase

      - name: Configure GCP credentials
        if: ${{ env.SYNC_BIGQUERY == 'true' }}
        shell: bash
        run: |
          echo "$GCP_SERVICE_ACCOUNT_KEY" > "$GOOGLE_APPLICATION_CREDENTIALS"
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Resolve anchor date
        id: dates
        shell: bash
        run: |
          if [ -n "$ANCHOR_DATE" ]; then
            DATE_VALUE="$ANCHOR_DATE"
          else
            DATE_VALUE="$(date -u +%Y-%m-%d)"
          fi
          echo "date=$DATE_VALUE" >> "$GITHUB_OUTPUT"

      - name: Generate PGA tournament dashboard
        if: ${{ env.RUN_PGA == 'true' }}
        shell: bash
        run: |
          python scripts/refresh_pga_tournament.py --baseline-only --skip-odds --skip-results-fetch

      - name: Retrain MLB home run model
        if: ${{ env.RUN_MLB_HR == 'true' && env.TRAIN_MLB_HR == 'true' }}
        shell: bash
        run: |
          python scripts/train_mlb_home_run_model.py \
            --start-date 2025-03-01 \
            --end-date "${{ steps.dates.outputs.date }}" \
            --test-start-date 2026-03-01

      - name: Generate MLB home run probabilities
        if: ${{ env.RUN_MLB_HR == 'true' }}
        shell: bash
        run: |
          python scripts/predict_mlb_home_runs.py \
            --date "${{ steps.dates.outputs.date }}" \
            --history-days 45 \
            --top-n 120

      - name: Apply player market serving schema
        if: ${{ env.RUN_MLB_HR == 'true' && env.SYNC_SUPABASE == 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: python scripts/apply_supabase_sql_files.py sql/015_player_market_serving_tables.sql

      - name: Fetch MLB home run odds
        if: ${{ env.RUN_MLB_HR == 'true' }}
        shell: bash
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          if [ "$SYNC_SUPABASE" = "true" ]; then
            python scripts/fetch_mlb_home_run_odds.py \
              --date "${{ steps.dates.outputs.date }}" \
              --sync-supabase
          else
            python scripts/fetch_mlb_home_run_odds.py \
              --date "${{ steps.dates.outputs.date }}"
          fi

      - name: Export combined prediction feed
        shell: bash
        run: |
          FEED_ARGS=()
          if [ "$RUN_PGA" != "true" ]; then
            FEED_ARGS+=(--skip-pga)
          fi
          if [ "$RUN_MLB_HR" != "true" ]; then
            FEED_ARGS+=(--skip-mlb)
          fi
          python scripts/export_prediction_feed.py "${FEED_ARGS[@]}"

      - name: Validate public JSON
        shell: bash
        run: |
          if [ "$RUN_MLB_HR" = "true" ]; then
            python scripts/validate_public_json.py --mlb-hr-date "${{ steps.dates.outputs.date }}"
          else
            python scripts/validate_public_json.py
          fi

      - name: Sync player markets to BigQuery
        if: ${{ env.SYNC_BIGQUERY == 'true' }}
        shell: bash
        run: |
          SYNC_ARGS=(--project "$PROJECT_ID")
          if [ "$RUN_PGA" != "true" ]; then
            SYNC_ARGS+=(--skip-pga)
          fi
          python scripts/sync_player_markets_to_bigquery.py "${SYNC_ARGS[@]}"

      - name: Sync player markets to Supabase
        if: ${{ env.SYNC_SUPABASE == 'true' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          supabaseDBpass: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          python scripts/apply_supabase_sql_files.py sql/015_player_market_serving_tables.sql
          SYNC_ARGS=()
          if [ "$RUN_PGA" != "true" ]; then
            SYNC_ARGS+=(--skip-pga)
          fi
          python scripts/sync_player_markets_to_supabase.py "${SYNC_ARGS[@]}"
